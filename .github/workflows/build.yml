name: Build App

on:
  repository_dispatch:
    types: [build-apk]

jobs:

  build:

    runs-on: ubuntu-latest

    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install ImageMagick
        run: |

          sudo apt-get update

          sudo apt-get install -y imagemagick

      - name: Replace Placeholders
        run: |

          find . -type f -exec sed -i "s|APP_NAME_PLACEHOLDER|${{ github.event.client_payload.appName }}|g" {} +

          find . -type f -exec sed -i "s|URL_PLACEHOLDER|${{ github.event.client_payload.websiteUrl }}|g" {} +

          find . -type f -exec sed -i "s|PACKAGE_PLACEHOLDER|${{ github.event.client_payload.packageName }}|g" {} +

          find . -type f -exec sed -i "s|ADMOB_APP_ID_PLACEHOLDER|${{ github.event.client_payload.admobAppId }}|g" {} +

          find . -type f -exec sed -i "s|BANNER_AD_ID_PLACEHOLDER|${{ github.event.client_payload.bannerAdId }}|g" {} +

          find . -type f -exec sed -i "s|INTERSTITIAL_AD_ID_PLACEHOLDER|${{ github.event.client_payload.interstitialAdId }}|g" {} +

          find . -type f -exec sed -i "s|VERSION_NAME_PLACEHOLDER|${{ github.event.client_payload.versionName }}|g" {} +

          find . -type f -exec sed -i "s|VERSION_CODE_PLACEHOLDER|${{ github.event.client_payload.versionCode }}|g" {} +

          find . -type f -exec sed -i "s|CONTENT_TYPE_PLACEHOLDER|${{ github.event.client_payload.contentType }}|g" {} +

          find . -type f -exec sed -i "s|HTML_CODE_PLACEHOLDER|${{ github.event.client_payload.htmlCode }}|g" {} +

      - name: Download Images
        run: |

          if [ ! -z "${{ github.event.client_payload.iconUrl }}" ]; then

            wget "${{ github.event.client_payload.iconUrl }}" -O icon.png || true

          fi

          if [ ! -z "${{ github.event.client_payload.splashUrl }}" ]; then

            wget "${{ github.event.client_payload.splashUrl }}" -O splash.png || true

          fi

      - name: Download HTML File
        run: |

          mkdir -p app/src/main/assets

          if [ "${{ github.event.client_payload.contentType }}" = "HTML_FILE" ]; then

            wget "${{ github.event.client_payload.htmlCode }}" -O app/src/main/assets/index.html || true

          fi

      - name: Generate Launcher Icons
        run: |

          mkdir -p app/src/main/res/mipmap-mdpi

          mkdir -p app/src/main/res/mipmap-hdpi

          mkdir -p app/src/main/res/mipmap-xhdpi

          mkdir -p app/src/main/res/mipmap-xxhdpi

          mkdir -p app/src/main/res/mipmap-xxxhdpi

          rm -f app/src/main/res/mipmap-*/ic_launcher.webp

          rm -f app/src/main/res/mipmap-*/ic_launcher_round.webp

          if [ -f icon.png ]; then

            convert icon.png -resize 48x48 PNG32:app/src/main/res/mipmap-mdpi/ic_launcher.png

            convert icon.png -resize 72x72 PNG32:app/src/main/res/mipmap-hdpi/ic_launcher.png

            convert icon.png -resize 96x96 PNG32:app/src/main/res/mipmap-xhdpi/ic_launcher.png

            convert icon.png -resize 144x144 PNG32:app/src/main/res/mipmap-xxhdpi/ic_launcher.png

            convert icon.png -resize 192x192 PNG32:app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

            cp app/src/main/res/mipmap-mdpi/ic_launcher.png app/src/main/res/mipmap-mdpi/ic_launcher_round.png

            cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher_round.png

            cp app/src/main/res/mipmap-xhdpi/ic_launcher.png app/src/main/res/mipmap-xhdpi/ic_launcher_round.png

            cp app/src/main/res/mipmap-xxhdpi/ic_launcher.png app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png

            cp app/src/main/res/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

          fi

      - name: Replace Splash Image
        run: |

          mkdir -p app/src/main/res/drawable

          if [ -f splash.png ]; then

            convert splash.png \
              -resize 1080x1920^ \
              -gravity center \
              -extent 1080x1920 \
              PNG32:app/src/main/res/drawable/splash_image.png

          fi

      - name: Decode Keystore
        run: |

          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.jks

      - name: Build APK and AAB
        run: |

          chmod +x gradlew

          ./gradlew assembleRelease bundleRelease

      - name: Create Output Folder
        run: |

          mkdir final-output

      - name: Copy APK
        run: |

          APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)

          cp "$APK_FILE" "final-output/${{ github.event.client_payload.packageName }}.apk"

      - name: Copy AAB
        run: |

          AAB_FILE=$(find app/build/outputs/bundle/release -name "*.aab" | head -n 1)

          cp "$AAB_FILE" "final-output/${{ github.event.client_payload.packageName }}.aab"

      - name: Generate Build Info
        run: |

          echo "App Name: ${{ github.event.client_payload.appName }}" > build-info.txt

          echo "Package ID: ${{ github.event.client_payload.packageName }}" >> build-info.txt

          echo "Version Name: ${{ github.event.client_payload.versionName }}" >> build-info.txt

          echo "Version Code: ${{ github.event.client_payload.versionCode }}" >> build-info.txt

      - name: Create ZIP Package
        run: |

          mkdir package

          cp final-output/*.apk package/ || true

          cp final-output/*.aab package/ || true

          cp build-info.txt package/ || true

          cp icon.png package/ || true

          cp splash.png package/ || true

          zip -r build-package.zip package

      - name: Upload ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-package
          path: build-package.zip